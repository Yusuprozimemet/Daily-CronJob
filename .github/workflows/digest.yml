name: Daily Digest

on:
  schedule:
    - cron: "0 5 * * *"  # 05:00 UTC = 07:00 Amsterdam (CEST, summer). In winter
                         # (CET) this fires at 06:00 local; change to "0 6 * * *".
  workflow_dispatch:       # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to commit seen.json back

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run digest
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py

      - name: Commit updated seen.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "chore: update seen.json [skip ci]"
          git push
